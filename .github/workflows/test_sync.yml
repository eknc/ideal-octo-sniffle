name: Test USOM (10 Pages Max)

on:
  workflow_dispatch: # Sadece manuel tetikleme aktif

jobs:
  run-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run test script
      run: python test-list.py

    - name: Commit test file
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add test-usom-domains.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Test: USOM incremental update" && git push)
