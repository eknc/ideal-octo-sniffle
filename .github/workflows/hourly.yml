name: USOM Hourly

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: # Manuel tetikleme butonunu korur

jobs:
  run-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run test script
      run: python hourly.py

    - name: Commit hourly file
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add usom-hourly.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Hourly USOM incremental update" && git push)
