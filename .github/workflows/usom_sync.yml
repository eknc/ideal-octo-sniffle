name: Update USOM Blocklist

on:
  schedule:
    # Runs every day at 03:00 UTC (06:00 Turkey Time)
    - cron: '0 3 * * *'
  workflow_dispatch: # Allows you to run it manually anytime

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to push changes back to repo

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run update script
      run: python update_list.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add usom-domains.txt
        # Only commit if there are actual updates
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated USOM list update" && git push)
